startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - FEEDBAGEL_API_KEY
    properties:
      FEEDBAGEL_API_KEY:
        type: string
        description: "API key from https://feedbagel.com/dashboard/keys (Agent scope)."
      FEEDBAGEL_API_BASE:
        type: string
        description: "Optional API base URL. Defaults to production."
  commandFunction: |-
    (config) => ({
      command: 'npx',
      args: ['-y', 'feedbagel-mcp'],
      env: {
        FEEDBAGEL_API_KEY: config.FEEDBAGEL_API_KEY,
        ...(config.FEEDBAGEL_API_BASE ? { FEEDBAGEL_API_BASE: config.FEEDBAGEL_API_BASE } : {})
      }
    })
